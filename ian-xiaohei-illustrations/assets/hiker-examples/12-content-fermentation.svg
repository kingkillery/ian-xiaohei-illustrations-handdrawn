<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .orange { fill: none; stroke: #ef6a1f; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .blue-stroke { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #111111; }
      .label-red { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #d32027; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- 临时经验 red label -->
  <text x="100" y="180" class="label-red">临时经验</text>
  <path stroke="#d32027" stroke-width="3" fill="none" d="M220 190 q10 30 -10 50"/>

  <!-- Hiker far left holding papers and pushing pump -->
  <g transform="translate(220 320)">
    <!-- legs -->
    <line class="ink" x1="-4" y1="80" x2="-12" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="12" y2="130"/>
    <path class="ink" d="M-22 130 q12 4 20 0"/>
    <path class="ink" d="M2 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-12" y="55" width="24" height="40" fill="#dfe7f5"/>
    <!-- hoodie leaning forward -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- left arm holding stack of papers -->
    <path class="ink" d="M-22 28 q-20 -10 -30 -30"/>
    <!-- stack of papers in left hand -->
    <g transform="translate(-66 -10)">
      <rect class="ink-fill" x="-20" y="0" width="40" height="50"/>
      <line class="ink-thin" x1="-12" y1="15" x2="14" y2="15"/>
      <line class="ink-thin" x1="-12" y1="25" x2="14" y2="25"/>
      <line class="ink-thin" x1="-12" y1="35" x2="14" y2="35"/>
      <text x="0" y="-5" text-anchor="middle" class="label" font-size="12">临时经验</text>
    </g>
    <!-- right arm reaching to pump handle -->
    <path class="ink" d="M22 28 q20 10 30 30"/>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
  </g>

  <!-- Hand pump -->
  <g transform="translate(360 400)">
    <!-- foot pedestal -->
    <ellipse class="ink-fill" cx="0" cy="60" rx="40" ry="14"/>
    <rect class="ink-fill" x="-30" y="0" width="60" height="60"/>
    <!-- pump handle (down position) -->
    <line class="ink" x1="0" y1="0" x2="0" y2="-30"/>
    <rect class="ink-fill" x="-30" y="-40" width="60" height="14"/>
    <!-- curved hose -->
    <path class="orange" d="M0 0 q100 -100 280 -120"/>
  </g>

  <!-- 记录进去 label -->
  <text x="280" y="500" class="label">记录进去</text>

  <!-- Big glass jar in center -->
  <g transform="translate(820 280)">
    <!-- jar body -->
    <path class="ink-fill" d="M-80 0 q-30 0 -30 40 v300 q0 30 30 30 h260 q30 0 30 -30 v-300 q0 -40 -30 -40 z"/>
    <!-- jar neck -->
    <rect class="ink-fill" x="-50" y="-40" width="100" height="40"/>
    <!-- stopper -->
    <rect class="ink-fill" x="-40" y="-50" width="80" height="20"/>
    <!-- floating paper notes in upper half -->
    <rect class="ink-thin" x="-40" y="60" width="40" height="30" fill="#fff"/>
    <line class="ink-thin" x1="-34" y1="70" x2="-6" y2="70"/>
    <line class="ink-thin" x1="-34" y1="80" x2="-12" y2="80"/>
    <rect class="ink-thin" x="10" y="80" width="40" height="30" fill="#fff"/>
    <line class="ink-thin" x1="16" y1="90" x2="44" y2="90"/>
    <line class="ink-thin" x1="16" y1="100" x2="40" y2="100"/>
    <rect class="ink-thin" x="-20" y="120" width="40" height="30" fill="#fff"/>
    <line class="ink-thin" x1="-14" y1="130" x2="14" y2="130"/>
    <line class="ink-thin" x1="-14" y1="140" x2="10" y2="140"/>
    <!-- orange dots/particles -->
    <circle cx="-30" cy="180" r="3" fill="#ef6a1f"/>
    <circle cx="20" cy="200" r="3" fill="#ef6a1f"/>
    <circle cx="-10" cy="220" r="3" fill="#ef6a1f"/>
    <circle cx="40" cy="240" r="3" fill="#ef6a1f"/>
    <circle cx="-40" cy="260" r="3" fill="#ef6a1f"/>
    <circle cx="20" cy="280" r="3" fill="#ef6a1f"/>
    <!-- concentric orange swirl rings at mid-level -->
    <ellipse cx="0" cy="240" rx="80" ry="20" fill="none" stroke="#ef6a1f" stroke-width="2"/>
    <ellipse cx="0" cy="240" rx="60" ry="14" fill="none" stroke="#ef6a1f" stroke-width="2"/>
    <ellipse cx="0" cy="240" rx="40" ry="8" fill="none" stroke="#ef6a1f" stroke-width="2"/>
    <!-- 3 cube blocks at bottom -->
    <g transform="translate(-60 320)">
      <rect class="ink-fill" x="0" y="0" width="40" height="40"/>
      <line class="ink-thin" x1="0" y1="20" x2="40" y2="20"/>
      <line class="ink-thin" x1="20" y1="0" x2="20" y2="40"/>
    </g>
    <g transform="translate(0 320)">
      <rect class="ink-fill" x="0" y="0" width="40" height="40"/>
      <line class="ink-thin" x1="0" y1="20" x2="40" y2="20"/>
      <line class="ink-thin" x1="20" y1="0" x2="20" y2="40"/>
    </g>
    <g transform="translate(60 320)">
      <rect class="ink-fill" x="0" y="0" width="40" height="40"/>
      <line class="ink-thin" x1="0" y1="20" x2="40" y2="20"/>
      <line class="ink-thin" x1="20" y1="0" x2="20" y2="40"/>
    </g>
  </g>

  <!-- Orange arrow into jar mouth -->
  <path class="orange" d="M650 200 q60 -20 130 -30"/>
  <polygon fill="#ef6a1f" points="780,170 800,166 794,180"/>

  <!-- Bench/table on the right with single cube output -->
  <g transform="translate(1280 540)">
    <!-- table -->
    <line class="ink" x1="-30" y1="0" x2="180" y2="0" stroke-width="3"/>
    <line class="ink" x1="0" y1="0" x2="0" y2="60"/>
    <line class="ink" x1="140" y1="0" x2="140" y2="60"/>
    <!-- cube with radiating lines -->
    <rect class="ink-fill" x="50" y="-50" width="40" height="40"/>
    <line class="ink-thin" x1="50" y1="-30" x2="90" y2="-30"/>
    <line class="ink-thin" x1="70" y1="-50" x2="70" y2="-10"/>
    <!-- radiating lines -->
    <line class="ink-thin" x1="30" y1="-70" x2="20" y2="-80"/>
    <line class="ink-thin" x1="70" y1="-80" x2="70" y2="-90"/>
    <line class="ink-thin" x1="110" y1="-70" x2="120" y2="-80"/>
    <text x="70" y="100" text-anchor="middle" class="label">资产</text>
  </g>

  <!-- 慢慢发酵 label -->
  <text x="940" y="240" class="label">慢慢发酵</text>
  <path class="ink" d="M1020 250 q30 30 60 70"/>

  <!-- 可复用 blue label -->
  <text x="1380" y="450" class="label-blue">可复用</text>
  <path class="blue-stroke" d="M1400 460 q-10 20 -30 30"/>
</svg>