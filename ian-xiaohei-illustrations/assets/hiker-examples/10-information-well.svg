<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .orange { fill: none; stroke: #ef6a1f; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .blue-stroke { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #111111; }
      .label-red { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #d32027; }
      .label-orange { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #ef6a1f; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- 信息井 label -->
  <text x="160" y="200" class="label">信息井</text>
  <path class="ink" d="M280 220 q30 60 30 100"/>

  <!-- Stone well (large circular, brick construction, high angle view) -->
  <g transform="translate(680 460)">
    <!-- outer rim ellipse (top view) -->
    <ellipse class="ink" cx="0" cy="0" rx="380" ry="100"/>
    <!-- brick rows on inner walls (depth illusion) -->
    <ellipse class="ink-thin" cx="0" cy="20" rx="350" ry="86"/>
    <ellipse class="ink-thin" cx="0" cy="50" rx="310" ry="70"/>
    <ellipse class="ink-thin" cx="0" cy="80" rx="270" ry="56"/>
    <ellipse class="ink-thin" cx="0" cy="110" rx="230" ry="42"/>
    <ellipse class="ink-thin" cx="0" cy="140" rx="200" ry="32"/>
    <!-- brick vertical lines -->
    <line class="ink-thin" x1="-180" y1="-50" x2="-180" y2="-30"/>
    <line class="ink-thin" x1="-90" y1="-90" x2="-90" y2="-70"/>
    <line class="ink-thin" x1="0" y1="-100" x2="0" y2="-80"/>
    <line class="ink-thin" x1="90" y1="-90" x2="90" y2="-70"/>
    <line class="ink-thin" x1="180" y1="-50" x2="180" y2="-30"/>

    <!-- scattered papers in the bottom -->
    <rect class="ink-thin" x="-180" y="80" width="50" height="35" fill="#fff" transform="rotate(-15 -155 97)"/>
    <line class="ink-thin" x1="-170" y1="90" x2="-140" y2="90" transform="rotate(-15 -155 97)"/>
    <rect class="ink-thin" x="-100" y="100" width="50" height="35" fill="#fff" transform="rotate(20 -75 117)"/>
    <line class="ink-thin" x1="-90" y1="110" x2="-60" y2="110" transform="rotate(20 -75 117)"/>
    <rect class="ink-thin" x="-40" y="120" width="50" height="35" fill="#fff" transform="rotate(-8 -15 137)"/>
    <rect class="ink-thin" x="40" y="100" width="50" height="35" fill="#fff" transform="rotate(10 65 117)"/>
    <rect class="ink-thin" x="100" y="120" width="50" height="35" fill="#fff" transform="rotate(-12 125 137)"/>
    <rect class="ink-thin" x="-150" y="130" width="40" height="30" fill="#fff" transform="rotate(8 -130 145)"/>
    <rect class="ink-thin" x="60" y="140" width="40" height="30" fill="#fff" transform="rotate(-20 80 155)"/>
  </g>

  <!-- Bucket suspended mid-well on orange rope -->
  <g transform="translate(680 540)">
    <path class="ink" d="M-30 0 L30 0 L24 40 L-24 40 z" fill="#fff"/>
    <line class="ink-thin" x1="-30" y1="10" x2="30" y2="10"/>
    <path class="ink-thin" d="M-30 0 q-6 -10 0 -16"/>
    <path class="ink-thin" d="M30 0 q6 -10 0 -16"/>
    <text x="0" y="28" text-anchor="middle" class="label" font-size="14">先捞一条</text>
  </g>

  <!-- Orange rope from hiker to bucket going down into well -->
  <path class="orange" d="M700 320 Q 690 400 690 540"/>

  <!-- Hiker on the well rim, leaning forward -->
  <g transform="translate(700 280)">
    <!-- legs -->
    <line class="ink" x1="-4" y1="80" x2="-12" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="12" y2="130"/>
    <path class="ink" d="M-22 130 q12 4 20 0"/>
    <path class="ink" d="M2 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-12" y="55" width="24" height="40" fill="#dfe7f5"/>
    <!-- hoodie leaning forward -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- both arms extended downward holding rope -->
    <path class="ink" d="M-22 30 q-12 30 -8 60"/>
    <path class="ink" d="M22 30 q12 30 8 60"/>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
  </g>

  <!-- 太多噪音 red label -->
  <text x="160" y="700" class="label-red">太多噪音</text>
  <path stroke="#d32027" stroke-width="3" fill="none" d="M270 710 q60 0 100 -10"/>

  <!-- Tray with 3 neat cards (right side) -->
  <g transform="translate(1280 540)">
    <rect class="ink-fill" x="0" y="0" width="320" height="100"/>
    <!-- 3 cards with geometric symbols -->
    <rect class="ink-fill" x="20" y="15" width="80" height="70"/>
    <circle class="ink-thin" cx="60" cy="40" r="12"/>
    <line class="ink-thin" x1="30" y1="60" x2="90" y2="60"/>
    <line class="ink-thin" x1="30" y1="70" x2="80" y2="70"/>
    <rect class="ink-fill" x="120" y="15" width="80" height="70"/>
    <rect class="ink-thin" x="148" y="28" width="24" height="24"/>
    <line class="ink-thin" x1="130" y1="60" x2="190" y2="60"/>
    <line class="ink-thin" x1="130" y1="70" x2="180" y2="70"/>
    <rect class="ink-fill" x="220" y="15" width="80" height="70"/>
    <polygon class="ink-thin" points="260,52 270,28 280,52"/>
    <line class="ink-thin" x1="230" y1="60" x2="290" y2="60"/>
    <line class="ink-thin" x1="230" y1="70" x2="280" y2="70"/>
  </g>

  <!-- 可行动 orange label -->
  <text x="1300" y="510" class="label-orange">可行动</text>
  <path class="orange" d="M1360 520 q40 0 60 10"/>

  <!-- 今天就做 blue label -->
  <text x="1450" y="730" class="label-blue">今天就做</text>
  <path class="blue-stroke" d="M1450 720 q-30 -20 -50 -40"/>
</svg>