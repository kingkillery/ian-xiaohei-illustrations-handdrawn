<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .orange { fill: none; stroke: #ef6a1f; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .blue-stroke { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #111111; }
      .label-red { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #d32027; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- LEFT: crumpled paper on angled feed tray -->
  <g transform="translate(140 200)">
    <!-- angled feed tray/platform -->
    <path class="ink-fill" d="M0 200 L260 200 L240 250 L20 250 z"/>
    <!-- crumpled paper -->
    <path class="ink-fill" d="M70 60 L180 50 L200 100 L180 180 L100 190 L60 130 z"/>
    <!-- crumpled texture lines -->
    <line class="ink-thin" x1="80" y1="100" x2="180" y2="100"/>
    <line class="ink-thin" x1="80" y1="130" x2="170" y2="130"/>
    <line class="ink-thin" x1="80" y1="160" x2="160" y2="160"/>
    <text x="135" y="130" text-anchor="middle" class="label">想法</text>
  </g>

  <!-- 想法太软 red label -->
  <text x="160" y="160" class="label-red">想法太软</text>
  <path stroke="#d32027" stroke-width="3" fill="none" d="M240 170 q10 30 -20 60"/>

  <!-- Center machine -->
  <g transform="translate(580 280)">
    <!-- boxy device body -->
    <rect class="ink-fill" x="0" y="0" width="420" height="380"/>
    <!-- 4 legs -->
    <line class="ink" x1="20" y1="380" x2="20" y2="420"/>
    <line class="ink" x1="400" y1="380" x2="400" y2="420"/>
    <line class="ink" x1="100" y1="380" x2="100" y2="420"/>
    <line class="ink" x1="320" y1="380" x2="320" y2="420"/>
    <!-- screw-press handle on top -->
    <line class="ink" x1="210" y1="0" x2="210" y2="-60"/>
    <line class="ink" x1="180" y1="-60" x2="240" y2="-60"/>
    <circle class="ink-fill" cx="210" cy="-70" r="6"/>
    <!-- window showing jagged teeth/blades -->
    <rect class="ink-thin" x="100" y="60" width="220" height="160" fill="#fff"/>
    <path class="ink" d="M110 80 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20"/>
    <path class="ink" d="M110 200 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20 l15 -20 l15 20"/>
    <!-- side crank (orange) -->
    <line class="orange" x1="0" y1="180" x2="-80" y2="180"/>
    <circle class="orange-fill" cx="-90" cy="180" r="14"/>
    <!-- side chute / output slot -->
    <rect class="ink-fill" x="420" y="160" width="40" height="60"/>
    <!-- nameplate -->
    <rect class="ink-thin" x="120" y="280" width="180" height="60" fill="#fff"/>
    <text x="210" y="320" text-anchor="middle" class="label">压一下</text>
  </g>

  <!-- Hiker on stool turning orange crank -->
  <g transform="translate(420 540)">
    <!-- stool -->
    <rect class="ink-fill" x="-30" y="0" width="60" height="10"/>
    <line class="ink" x1="-22" y1="10" x2="-26" y2="60"/>
    <line class="ink" x1="-8" y1="10" x2="-8" y2="60"/>
    <line class="ink" x1="8" y1="10" x2="8" y2="60"/>
    <line class="ink" x1="22" y1="10" x2="26" y2="60"/>
    <!-- legs standing on stool -->
    <line class="ink" x1="-12" y1="-50" x2="-12" y2="-5"/>
    <line class="ink" x1="12" y1="-50" x2="12" y2="-5"/>
    <path class="ink" d="M-22 -5 q10 4 18 0"/>
    <path class="ink" d="M2 -5 q10 4 18 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-18" y="-90" width="36" height="50" fill="#dfe7f5"/>
    <!-- hoodie -->
    <path class="ink" d="M-32 -130 q32 -32 64 0 v45 q-32 14 -64 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-4 -120 l4 -8 l4 8 z"/>
    <!-- both arms extended forward to crank -->
    <path class="ink" d="M-26 -120 q-30 0 -50 -10"/>
    <path class="ink" d="M26 -120 q-10 0 -30 -10"/>
    <!-- head -->
    <circle class="ink" cx="0" cy="-150" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -155 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 -138 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -158 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-155" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-155" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="-148" r="1.6" fill="#111"/>
    <circle cx="7" cy="-148" r="1.6" fill="#111"/>
  </g>

  <!-- Key being ejected from chute -->
  <g transform="translate(1080 420)">
    <circle class="ink-fill" cx="0" cy="0" r="22"/>
    <line class="ink" x1="0" y1="20" x2="0" y2="60"/>
    <line class="ink" x1="-12" y1="40" x2="-22" y2="40"/>
    <line class="ink" x1="-12" y1="50" x2="-18" y2="50"/>
    <line class="ink" x1="12" y1="40" x2="22" y2="40"/>
    <line class="ink" x1="12" y1="50" x2="18" y2="50"/>
  </g>

  <!-- Orange arrow from chute to key -->
  <path class="orange" d="M1040 410 q20 0 30 0"/>
  <polygon fill="#ef6a1f" points="1066,402 1078,410 1066,418"/>

  <!-- Hand reaching out -->
  <g transform="translate(1280 460)">
    <path class="ink-fill" d="M0 0 q0 -20 20 -20 q20 0 20 20 q0 20 -10 30 l0 60 l-20 0 l0 -60 q-10 -10 -10 -30 z"/>
    <line class="ink-thin" x1="-10" y1="40" x2="30" y2="40"/>
  </g>

  <!-- 加约束 label -->
  <text x="700" y="200" class="label">加约束</text>
  <path class="ink" d="M780 210 q10 10 10 30"/>

  <!-- 小测试 label -->
  <text x="1080" y="350" class="label">小测试</text>
  <path class="ink" d="M1110 360 q-2 20 -10 30"/>

  <!-- 有人愿意试 blue label -->
  <text x="1320" y="370" class="label-blue">有人愿意试</text>
  <path class="blue-stroke" d="M1380 380 q-10 30 -30 50"/>

  <!-- 想软→red arrow pointing down -->
  <path stroke="#d32027" stroke-width="3" fill="none" d="M280 280 q60 30 100 60"/>
  <polygon fill="#d32027" points="378,336 390,346 384,358"/>
</svg>