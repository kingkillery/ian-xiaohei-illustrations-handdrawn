<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .red-stroke { fill: none; stroke: #d32027; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .blue-stroke { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #111111; }
      .label-red { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 24px; fill: #d32027; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- LEFT document -->
  <g transform="translate(80 250)">
    <rect class="ink-fill" x="0" y="0" width="280" height="400"/>
    <text x="140" y="50" text-anchor="middle" class="label">一篇写完的内容</text>
    <line class="ink-thin" x1="40" y1="80" x2="240" y2="80"/>
    <line class="ink-thin" x1="40" y1="110" x2="240" y2="110"/>
    <line class="ink-thin" x1="40" y1="140" x2="220" y2="140"/>
    <line class="ink-thin" x1="40" y1="170" x2="240" y2="170"/>
    <line class="ink-thin" x1="40" y1="200" x2="200" y2="200"/>
    <line class="ink-thin" x1="40" y1="230" x2="240" y2="230"/>
    <!-- 下一步 button -->
    <rect class="red-stroke" x="70" y="320" width="140" height="50" fill="#fff"/>
    <text x="140" y="354" text-anchor="middle" class="label-red">下一步</text>
  </g>

  <!-- Center toolbox -->
  <g transform="translate(620 280)">
    <!-- box body -->
    <rect class="ink-fill" x="0" y="60" width="500" height="220"/>
    <!-- lid (propped open) -->
    <rect class="ink-fill" x="-20" y="-20" width="540" height="80"/>
    <path class="ink" d="M0 60 L-20 -20 M500 60 L520 -20"/>
    <!-- compartments -->
    <rect class="ink" x="20" y="80" width="140" height="180"/>
    <rect class="ink" x="180" y="80" width="140" height="180"/>
    <rect class="ink" x="340" y="80" width="140" height="180"/>
    <!-- stamps inside each compartment -->
    <g transform="translate(50 130)">
      <rect class="ink-fill" x="20" y="40" width="60" height="40"/>
      <rect class="ink-fill" x="40" y="0" width="20" height="40"/>
    </g>
    <g transform="translate(210 130)">
      <rect class="ink-fill" x="20" y="40" width="60" height="40"/>
      <rect class="ink-fill" x="40" y="0" width="20" height="40"/>
    </g>
    <g transform="translate(370 130)">
      <rect class="ink-fill" x="20" y="40" width="60" height="40"/>
      <rect class="ink-fill" x="40" y="0" width="20" height="40"/>
    </g>
    <!-- front compartment labels -->
    <text x="90" y="280" text-anchor="middle" class="label">钩子句</text>
    <text x="250" y="280" text-anchor="middle" class="label">知识库</text>
    <text x="410" y="280" text-anchor="middle" class="label">核心课</text>
    <!-- 结尾工具箱 red label on lid -->
    <text x="250" y="30" text-anchor="middle" class="label-red">结尾工具箱</text>
  </g>

  <!-- Hiker left-of-center holding rubber stamp -->
  <g transform="translate(480 380)">
    <!-- legs -->
    <line class="ink" x1="-4" y1="80" x2="-12" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="12" y2="130"/>
    <path class="ink" d="M-22 130 q12 4 20 0"/>
    <path class="ink" d="M2 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-12" y="55" width="24" height="40" fill="#dfe7f5"/>
    <!-- hoodie -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- right arm extended holding stamp -->
    <path class="ink" d="M20 28 q40 -10 80 -30"/>
    <!-- stamp (handle on top, rectangular base) -->
    <g transform="translate(100 -10)">
      <rect class="ink-fill" x="-10" y="-30" width="20" height="40"/>
      <rect class="ink-fill" x="-20" y="10" width="40" height="30"/>
      <!-- motion lines -->
      <line stroke="#d32027" stroke-width="2" x1="20" y1="40" x2="40" y2="60"/>
      <line stroke="#d32027" stroke-width="2" x1="-30" y1="40" x2="-50" y2="60"/>
    </g>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
  </g>

  <!-- arrows -->
  <path class="ink" d="M380 450 q60 0 100 0"/>
  <polygon fill="#111" points="478,444 488,450 478,456"/>
  <path class="ink" d="M1140 450 q60 0 100 0"/>
  <polygon fill="#111" points="1238,444 1248,450 1238,456"/>

  <!-- RIGHT document -->
  <g transform="translate(1310 250)">
    <rect class="ink-fill" x="0" y="0" width="280" height="400"/>
    <text x="140" y="50" text-anchor="middle" class="label">一篇写完的内容</text>
    <line class="ink-thin" x1="40" y1="80" x2="240" y2="80"/>
    <line class="ink-thin" x1="40" y1="110" x2="240" y2="110"/>
    <line class="ink-thin" x1="40" y1="140" x2="220" y2="140"/>
    <line class="ink-thin" x1="40" y1="170" x2="240" y2="170"/>
    <line class="ink-thin" x1="40" y1="200" x2="200" y2="200"/>
    <line class="ink-thin" x1="40" y1="230" x2="240" y2="230"/>
    <rect class="red-stroke" x="70" y="320" width="140" height="50" fill="#fff"/>
    <text x="140" y="354" text-anchor="middle" class="label-red">下一步</text>
  </g>

  <!-- Right hiker walking away with tag/keychain -->
  <g transform="translate(1480 720)">
    <!-- legs walking -->
    <line class="ink" x1="-4" y1="80" x2="-14" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="18" y2="130"/>
    <path class="ink" d="M-24 130 q12 4 20 0"/>
    <path class="ink" d="M8 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-14" y="55" width="28" height="40" fill="#dfe7f5"/>
    <!-- hoodie -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- arms -->
    <path class="ink" d="M-26 30 q-12 14 -8 40"/>
    <path class="ink" d="M26 30 q14 14 8 40"/>
    <!-- tag/keychain -->
    <line class="ink" x1="36" y1="40" x2="60" y2="60"/>
    <rect class="ink-fill" x="60" y="50" width="40" height="30"/>
    <text x="80" y="70" text-anchor="middle" class="label" font-size="12">DELIVERY</text>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
    <!-- motion lines -->
    <line class="ink-thin" x1="60" y1="20" x2="80" y2="20"/>
    <line class="ink-thin" x1="60" y1="40" x2="80" y2="40"/>
  </g>

  <!-- 直接调取 blue label and curved arrow -->
  <text x="1100" y="180" class="label-blue">直接调取</text>
  <path class="blue-stroke" d="M1180 200 q60 60 60 100"/>
  <polygon fill="#1f4ea8" points="1230,300 1250,302 1242,314"/>
</svg>