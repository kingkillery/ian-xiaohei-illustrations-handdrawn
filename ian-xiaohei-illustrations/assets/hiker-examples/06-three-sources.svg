<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .orange { fill: none; stroke: #ef6a1f; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .blue-dash { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 6; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 20px; fill: #111111; }
      .label-orange { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 20px; fill: #ef6a1f; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 20px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- 外部信号 (orange left, top) -->
  <text x="80" y="180" class="label-orange">外部信号</text>
  <path class="orange" d="M180 190 q14 14 18 30"/>

  <!-- 内部资产 (orange left, middle) -->
  <text x="80" y="450" class="label-orange">内部资产</text>
  <path class="orange" d="M180 460 q14 14 18 30"/>

  <!-- 用户反馈 (orange left, bottom) -->
  <text x="80" y="720" class="label-orange">用户反馈</text>
  <path class="orange" d="M180 730 q14 14 18 30"/>

  <!-- Funnel: top tier (satellite) -->
  <g transform="translate(380 200)">
    <!-- satellite dish -->
    <path class="ink" d="M0 80 q-30 -40 -10 -70"/>
    <line class="ink" x1="0" y1="80" x2="0" y2="60"/>
    <ellipse class="ink-fill" cx="0" cy="0" rx="50" ry="20"/>
    <!-- lightning bolts -->
    <path class="ink-thin" d="M-80 -10 l-10 -10 l8 0 l-12 -16"/>
    <path class="ink-thin" d="M80 -10 l10 -10 l-8 0 l12 -16"/>
    <!-- flying papers -->
    <rect class="ink-thin" x="-100" y="-30" width="30" height="40" fill="#fff" transform="rotate(-20 -85 -10)"/>
    <rect class="ink-thin" x="60" y="-40" width="30" height="40" fill="#fff" transform="rotate(15 75 -20)"/>
  </g>
  <!-- top tier rim (circle, pin dot for string) -->
  <g transform="translate(380 360)">
    <ellipse class="ink-fill" cx="0" cy="0" rx="240" ry="40"/>
    <circle class="ink-fill" cx="120" cy="-4" r="6" fill="#111"/>
  </g>

  <!-- pipe between tiers -->
  <line class="ink" x1="380" y1="360" x2="380" y2="440"/>
  <!-- droplets -->
  <path class="ink-thin" d="M374 388 q-4 6 0 12 q4 -6 0 -12 z" fill="#111"/>
  <path class="ink-thin" d="M386 408 q-4 6 0 12 q4 -6 0 -12 z" fill="#111"/>

  <!-- middle tier -->
  <g transform="translate(380 480)">
    <ellipse class="ink-fill" cx="0" cy="0" rx="280" ry="44"/>
    <!-- filing cabinet -->
    <rect class="ink-fill" x="-100" y="-30" width="60" height="50"/>
    <circle class="ink-fill" cx="-70" cy="-15" r="3"/>
    <circle class="ink-fill" cx="-70" cy="5" r="3"/>
    <!-- 3 books -->
    <g transform="translate(20 -30)">
      <rect class="ink-fill" x="0" y="0" width="20" height="55"/>
      <text x="10" y="30" text-anchor="middle" class="label" font-size="10">方法论笔记</text>
    </g>
    <g transform="translate(50 -30)">
      <rect class="ink-fill" x="0" y="0" width="20" height="55" fill="#dfe7f5"/>
      <text x="10" y="30" text-anchor="middle" class="label" font-size="10">课程卡片</text>
    </g>
    <g transform="translate(80 -30)">
      <rect class="ink-fill" x="0" y="0" width="20" height="55" fill="#dfe7f5"/>
      <text x="10" y="30" text-anchor="middle" class="label" font-size="10">案例库</text>
    </g>
    <!-- pin dot -->
    <circle class="ink-fill" cx="140" cy="-4" r="6" fill="#111"/>
  </g>

  <!-- pipe -->
  <line class="ink" x1="380" y1="520" x2="380" y2="600"/>
  <path class="ink-thin" d="M374 548 q-4 6 0 12 q4 -6 0 -12 z" fill="#111"/>
  <path class="ink-thin" d="M386 568 q-4 6 0 12 q4 -6 0 -12 z" fill="#111"/>

  <!-- bottom tier -->
  <g transform="translate(380 640)">
    <ellipse class="ink-fill" cx="0" cy="0" rx="320" ry="50"/>
    <!-- rabbit -->
    <g transform="translate(-150 -20)">
      <ellipse class="ink-fill" cx="0" cy="10" rx="22" ry="14"/>
      <ellipse class="ink-fill" cx="-8" cy="-8" rx="3" ry="14"/>
      <ellipse class="ink-fill" cx="8" cy="-8" rx="3" ry="14"/>
      <circle cx="-6" cy="10" r="1.5" fill="#111"/>
      <circle cx="6" cy="10" r="1.5" fill="#111"/>
    </g>
    <!-- envelope / papers -->
    <rect class="ink-fill" x="40" y="-15" width="80" height="40"/>
    <path class="ink-thin" d="M40 -15 l40 25 l40 -25"/>
    <text x="80" y="20" text-anchor="middle" class="label" font-size="10">评论</text>
    <rect class="ink-fill" x="140" y="-10" width="60" height="40"/>
    <text x="170" y="20" text-anchor="middle" class="label" font-size="10">私信</text>
    <!-- pin dot -->
    <circle class="ink-fill" cx="160" cy="-4" r="6" fill="#111"/>
  </g>

  <!-- 3 red downward arrows from tiers to bucket -->
  <path d="M340 760 q-20 30 -30 60" stroke="#d32027" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon fill="#d32027" points="306,820 318,810 326,822"/>
  <path d="M380 770 q0 30 0 50" stroke="#d32027" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon fill="#d32027" points="374,820 386,820 380,832"/>
  <path d="M420 760 q20 30 30 60" stroke="#d32027" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon fill="#d32027" points="448,820 462,810 450,822"/>

  <!-- Bucket -->
  <g transform="translate(330 820)">
    <path class="ink-fill" d="M-30 0 L100 0 L90 80 L-20 80 z"/>
    <line class="ink" x1="-10" y1="20" x2="80" y2="20"/>
    <path class="ink-thin" d="M-30 0 q-10 -10 0 -20"/>
    <path class="ink-thin" d="M100 0 q10 -10 0 -20"/>
    <text x="35" y="50" text-anchor="middle" class="label">选题桶</text>
  </g>

  <!-- Hiker on the right pulling 3 strings -->
  <g transform="translate(1180 600)">
    <!-- legs -->
    <line class="ink" x1="-4" y1="80" x2="-12" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="12" y2="130"/>
    <path class="ink" d="M-22 130 q12 4 20 0"/>
    <path class="ink" d="M2 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-12" y="55" width="24" height="40" fill="#dfe7f5"/>
    <!-- hoodie -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- left arm extended outward pulling strings -->
    <path class="ink" d="M-26 30 q-60 -20 -120 -50"/>
    <path class="ink" d="M-26 35 q-50 -10 -100 -20"/>
    <path class="ink" d="M-26 40 q-40 0 -80 20"/>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <line class="ink-thin" x1="-26" y1="-2" x2="26" y2="-2"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
    <!-- right arm -->
    <path class="ink" d="M26 30 q14 8 18 30"/>
  </g>

  <!-- 3 strings connecting hiker hand to pin dots on tiers (going to top, middle, bottom) -->
  <path class="ink" d="M1180 590 Q 800 480 540 360"/>
  <path class="ink" d="M1180 590 Q 800 500 540 480"/>
  <path class="ink" d="M1180 600 Q 800 580 540 640"/>

  <!-- 都要进来 blue annotation -->
  <text x="1180" y="490" class="label-blue">都要进来</text>
  <path class="blue-dash" d="M1240 500 q-100 80 -180 200"/>
  <polygon fill="#1f4ea8" points="1058,696 1070,710 1062,716"/>
</svg>