<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <rect width="1672" height="941" fill="#ffffff"/>
  <defs>
    <style>
      .ink { fill: none; stroke: #111111; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #ffffff; stroke: #111111; stroke-width: 2.6; stroke-linejoin: round; }
      .orange { fill: none; stroke: #ef6a1f; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .blue-stroke { fill: none; stroke: #1f4ea8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #111111; }
      .label-red { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #d32027; }
      .label-blue { font-family: "Comic Sans MS", "Marker Felt", "Segoe Print", "Kaiti", cursive; font-size: 22px; fill: #1f4ea8; }
    </style>
  </defs>

  <!-- LEFT panel: stack of ~8 boxes with crushed hiker -->
  <g transform="translate(180 200)">
    <!-- stack of boxes -->
    <rect class="ink-fill" x="60" y="0" width="180" height="50" transform="rotate(-3 150 25)"/>
    <rect class="ink-fill" x="60" y="50" width="180" height="50" transform="rotate(2 150 75)"/>
    <rect class="ink-fill" x="60" y="100" width="180" height="50" transform="rotate(-2 150 125)"/>
    <rect class="ink-fill" x="60" y="150" width="180" height="50" transform="rotate(3 150 175)"/>
    <rect class="ink-fill" x="60" y="200" width="180" height="50" transform="rotate(-1 150 225)"/>
    <rect class="ink-fill" x="60" y="250" width="180" height="50" transform="rotate(2 150 275)"/>
    <rect class="ink-fill" x="60" y="300" width="180" height="50" transform="rotate(-2 150 325)"/>
    <rect class="ink-fill" x="60" y="350" width="180" height="50" transform="rotate(1 150 375)"/>
    <!-- "重复活" labels on each box -->
    <text x="150" y="32" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="82" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="132" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="182" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="232" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="282" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="332" text-anchor="middle" class="label" font-size="16">重复活</text>
    <text x="150" y="382" text-anchor="middle" class="label" font-size="16">重复活</text>
    <!-- motion lines on sides -->
    <line class="ink-thin" x1="50" y1="100" x2="40" y2="120"/>
    <line class="ink-thin" x1="50" y1="200" x2="40" y2="220"/>
    <line class="ink-thin" x1="50" y1="300" x2="40" y2="320"/>
    <line class="ink-thin" x1="250" y1="100" x2="260" y2="120"/>
    <line class="ink-thin" x1="250" y1="200" x2="260" y2="220"/>
    <line class="ink-thin" x1="250" y1="300" x2="260" y2="320"/>
  </g>

  <!-- crushed hiker (pinned flat) at base -->
  <g transform="translate(330 720)">
    <!-- legs sprawled -->
    <line class="ink" x1="-50" y1="0" x2="-80" y2="-20"/>
    <line class="ink" x1="50" y1="0" x2="80" y2="-20"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-50" y="-20" width="100" height="20" fill="#dfe7f5"/>
    <!-- arms splayed outward -->
    <path class="ink" d="M-50 -25 q-30 -30 -50 -40"/>
    <path class="ink" d="M50 -25 q30 -30 50 -40"/>
    <!-- hoodie squashed -->
    <path class="ink-fill" d="M-50 -40 q50 -20 100 0 q-10 25 -50 25 q-40 0 -50 -25 z" stroke="#111"/>
    <!-- head squashed -->
    <ellipse class="ink-fill" cx="0" cy="-55" rx="28" ry="14"/>
    <!-- hair -->
    <path class="ink-thin" d="M-26 -60 q0 -10 26 -10 q26 0 26 10"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 -50 q12 8 24 0"/>
    <!-- cap squashed -->
    <path class="ink" d="M-28 -68 q0 -10 28 -10 q28 0 28 10 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-28" cy="-60" rx="5" ry="6" fill="#cdd9f0"/>
    <ellipse class="ink" cx="28" cy="-60" rx="5" ry="6" fill="#cdd9f0"/>
    <!-- wide eyes (distressed) -->
    <circle cx="-10" cy="-55" r="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <circle cx="10" cy="-55" r="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <circle cx="-10" cy="-55" r="2" fill="#111"/>
    <circle cx="10" cy="-55" r="2" fill="#111"/>
    <!-- flat mouth -->
    <line class="ink-thin" x1="-8" y1="-44" x2="8" y2="-44"/>
  </g>

  <!-- 又是我 red label -->
  <text x="100" y="780" class="label-red">又是我</text>
  <path stroke="#d32027" stroke-width="3" fill="none" d="M180 790 q40 0 80 -20"/>

  <!-- red wavy distress lines at base -->
  <path stroke="#d32027" stroke-width="2.5" fill="none" stroke-linecap="round" d="M260 760 q10 -8 20 0 q10 8 20 0 q10 -8 20 0 q10 8 20 0 q10 -8 20 0 q10 8 20 0"/>

  <!-- CENTER: large orange arrow -->
  <path class="orange" d="M540 470 L760 470" stroke-width="6"/>
  <polygon fill="#ef6a1f" points="760,440 800,470 760,500"/>

  <!-- RIGHT panel: wall-mounted pulley/winch with platform -->
  <g transform="translate(1080 180)">
    <!-- wall mount bracket -->
    <rect class="ink-fill" x="-40" y="20" width="80" height="30"/>
    <!-- horizontal rod -->
    <line class="ink" x1="-40" y1="50" x2="240" y2="50" stroke-width="4"/>
    <!-- pulley wheel at top -->
    <circle class="ink-fill" cx="200" cy="50" r="40"/>
    <circle class="ink-thin" cx="200" cy="50" r="14"/>
    <line class="ink-thin" x1="200" y1="10" x2="200" y2="90"/>
    <line class="ink-thin" x1="160" y1="50" x2="240" y2="50"/>
    <!-- orange ropes -->
    <path class="orange" d="M-40 50 q-30 100 -50 200"/>
    <path class="orange" d="M240 50 q-20 100 -30 200"/>
    <line class="orange" x1="-40" y1="250" x2="210" y2="250" stroke-width="4"/>
    <!-- suspension platform -->
    <rect class="ink-fill" x="-50" y="250" width="270" height="50"/>
    <!-- boxes on platform (2 rows × 4 cols) -->
    <rect class="ink-fill" x="-40" y="260" width="50" height="35"/>
    <text x="-15" y="282" text-anchor="middle" class="label" font-size="12">重复活</text>
    <rect class="ink-fill" x="20" y="260" width="50" height="35"/>
    <text x="45" y="282" text-anchor="middle" class="label" font-size="12">重复活</text>
    <rect class="ink-fill" x="80" y="260" width="50" height="35"/>
    <text x="105" y="282" text-anchor="middle" class="label" font-size="12">重复活</text>
    <rect class="ink-fill" x="140" y="260" width="50" height="35"/>
    <text x="165" y="282" text-anchor="middle" class="label" font-size="12">重复活</text>
  </g>

  <!-- 系统承重 orange label -->
  <text x="1380" y="180" class="label">系统承重</text>
  <path class="orange" d="M1380 190 q-30 30 -60 60"/>

  <!-- 松一点 orange label -->
  <text x="1240" y="340" class="label">松一点</text>
  <path class="orange" d="M1240 350 q-20 20 -50 40"/>

  <!-- Right hiker turning valve and holding sign -->
  <g transform="translate(1000 480)">
    <!-- valve/winch knob on wall -->
    <g transform="translate(-50 -20)">
      <circle class="ink-fill" cx="0" cy="0" r="20"/>
      <line class="ink" x1="-10" y1="-10" x2="10" y2="10"/>
      <line class="ink" x1="-10" y1="10" x2="10" y2="-10"/>
    </g>
    <!-- legs -->
    <line class="ink" x1="-4" y1="80" x2="-12" y2="130"/>
    <line class="ink" x1="4" y1="80" x2="12" y2="130"/>
    <path class="ink" d="M-22 130 q12 4 20 0"/>
    <path class="ink" d="M2 130 q12 4 20 0"/>
    <!-- jeans -->
    <rect class="ink-thin" x="-12" y="55" width="24" height="40" fill="#dfe7f5"/>
    <!-- hoodie -->
    <path class="ink" d="M-26 20 q26 -28 52 0 v40 q-26 12 -52 0 z" fill="#f0f0f0"/>
    <!-- triangle logo -->
    <path class="ink-thin" d="M-2 30 l4 -8 l4 8 z"/>
    <!-- left arm turning valve -->
    <path class="ink" d="M-22 28 q-30 -20 -50 -30"/>
    <!-- right arm holding small rectangular sign -->
    <path class="ink" d="M22 28 q30 10 50 20"/>
    <!-- small sign with 判断 -->
    <rect class="ink-fill" x="70" y="40" width="80" height="40"/>
    <text x="110" y="68" text-anchor="middle" class="label" font-size="20">判断</text>
    <!-- head -->
    <circle class="ink" cx="0" cy="0" r="22" fill="#fff"/>
    <!-- hair -->
    <path class="ink-thin" d="M-22 -5 q0 -22 22 -22 q22 0 22 22"/>
    <!-- beard -->
    <path class="ink-thin" d="M-12 12 q12 14 24 0"/>
    <!-- cap -->
    <path class="ink" d="M-24 -8 q0 -28 24 -28 q24 0 24 28 z" fill="#cdd9f0"/>
    <!-- headphones -->
    <ellipse class="ink" cx="-26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <ellipse class="ink" cx="26" cy="-5" rx="6" ry="9" fill="#cdd9f0"/>
    <!-- eyes -->
    <circle cx="-7" cy="2" r="1.6" fill="#111"/>
    <circle cx="7" cy="2" r="1.6" fill="#111"/>
  </g>

  <!-- 只管判断 blue label -->
  <text x="1080" y="850" class="label-blue">只管判断</text>
  <path class="blue-stroke" d="M1080 840 q-40 -30 -60 -100"/>
</svg>